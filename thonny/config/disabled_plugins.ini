# 禁用有问题的插件配置
# 这些插件由于缺少minny.target模块而无法加载

[disabled_plugins]
# 禁用calliope插件（缺少minny.target模块）
calliope = true

# 禁用microbit插件（缺少minny.target模块）
microbit = true

# 禁用rp2040插件（缺少minny.target模块）
rp2040 = true

# 禁用rpi_pico插件（可能也有类似问题）
rpi_pico = true

# 保留核心功能插件
assistant = false
chat = false
ollama = false
beginner_ui_theme = false
beginner_config_page = false
editor = false
shell = false
help = false
files = false